name: Compile Gamemode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install Wine
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update -qq
        sudo apt-get install -y -qq wine32 wine64 2>&1 | tail -3

    - name: Compile inferno.pwn
      env:
        WINEDEBUG: -all
      run: |
        cd gamemodes
        set +e
        wine ../pawno/pawncc.exe \
          inferno.pwn \
          -i"../pawno/include" \
          -i"../include" \
          -oinferno.amx \
          -d3 \
          2>&1 | tee ../compile.log
        rc=${PIPESTATUS[0]}
        echo "pawncc exit code: $rc"
        echo "---"
        if [ -f inferno.amx ] && [ -s inferno.amx ]; then
          echo "COMPILE SUCCESS - inferno.amx created ($(stat -c%s inferno.amx) bytes)"
        else
          echo "COMPILE FAILED - no .amx produced"
          cat ../compile.log
          exit 1
        fi

    - name: Upload compile log (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compile-log
        path: compile.log
        if-no-files-found: warn
        retention-days: 30

    - name: Upload .amx artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: inferno-amx
        path: gamemodes/inferno.amx
        if-no-files-found: error
        retention-days: 90

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: compiled-${{ github.sha }}
        name: Build ${{ github.sha }}
        files: gamemodes/inferno.amx
        body: |
          Compiled from commit ${{ github.sha }}
          Build: ${{ github.run_id }}
        draft: false
        prerelease: false
